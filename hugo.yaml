module:
  imports:
    - path: github.com/imfing/hextra
# Suppress deprecation warnings
ignoreLogs:
  - "deprecated"    

params:
  title: "Collab.codes Docs"
  description: "Official documentation and knowledge base of Collab.codes"

  # Theme
  theme:
    default: system
    displayToggle: true

  # Hextra settings
  showSearch: true
  showToc: true
  showLastUpdated: true
  showBreadCrumbs: true  

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/collab-codes/collab-docs-hextra/edit/main/content"

  nav:
    - title: Home
      url: /
    - title: Blog
      url: https://blog.collab.codes

menu:
  main:
    - name: Home
      url: "https://www.collab.codes"
      weight: 1
      params:
        target: "_self"      
    - name: Docs
      url: "https://docs.collab.codes"
      weight: 2
      params:
        target: "_self"      
    - name: Blog
      url: https://blog.collab.codes
      weight: 3
      params:
        target: "_self"      
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/collab-codes/collab-docs-hextra"
      params:
        icon: github
    - name: Twitter
      weight: 6
      url: "https://twitter.com/"
      params:
        icon: x-twitter
